{{ $isLocal := (or (eq .Site.BaseURL "/") (strings.Contains .Site.BaseURL "localhost")) }}
{{ $locationPrefix := .Site.Params.uniNavHeaderLocationPrefix }}
{{ $logoIcon := .Site.Params.uniNavHeaderLogoIcon | default "img/large-logo.svg" }}


<qg-top-nav
    breakpoint="1024"
    class="is-highest navbar is-fixed-top"
    location-prefix="{{ $locationPrefix }}"
    logo-icon="{{ $logoIcon | absURL }}"
    logo-link="{{ .Site.BaseURL }}"
    second-menu-prefix="https://dz.qgis.org/"
    secondary-menu-config="https://raw.githubusercontent.com/Xpirix/QGIS-UG-Algeria/main/static/config/navigation.json"
></qg-top-nav>
